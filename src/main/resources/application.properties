# Base de données
spring.datasource.url=jdbc:postgresql://localhost:5432/fittrack
spring.datasource.username=postgres
spring.datasource.password=fittrack
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Port du serveur
server.port=8081

# Désactiver Spring Security en dev
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

#JWT
jwt.secret=fittrack-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000